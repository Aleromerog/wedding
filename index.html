<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ana & Jorge · Sep 2025 — Our Wedding" />
  <title>Ana & Jorge · Sep 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Intro overlay -->
  <div id="intro-overlay">
    <div class="intro-content">
      <p class="intro-date">Sep 2025</p>
      <h1 class="intro-title">Ana & Jorge</h1>
      <div class="intro-divider"></div>
      <p class="intro-sub">Our Wedding</p>
    </div>
  </div>

  <!-- Carousel -->
  <div id="carousel" role="region" aria-label="Wedding photo carousel">

    <!-- Slides container -->
    <div id="slides-wrapper"></div>

    <!-- Cinematic top gradient -->
    <div class="gradient-top"></div>
    <!-- Cinematic bottom gradient -->
    <div class="gradient-bottom"></div>

    <!-- Title -->
    <div class="carousel-title">
      <div class="carousel-title-row">
        <span class="carousel-title-main">Ana &amp; Jorge</span>
        <span class="carousel-title-date">Sep 27th 2025</span>
      </div>
    </div>

    <!-- Navigation -->
    <button id="btn-prev" class="nav-btn" aria-label="Previous photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <button id="btn-next" class="nav-btn" aria-label="Next photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </button>

    <!-- Slide counter -->
    <div id="counter" class="counter" aria-live="polite">
      <span id="counter-current">1</span>
      <span class="counter-sep">/</span>
      <span id="counter-total">1</span>
    </div>

    <!-- Grid toggle button -->
    <button id="btn-grid" class="nav-btn" aria-label="Show thumbnails">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
    </button>

    <!-- Dot indicators -->
    <div id="dots" class="dots" role="tablist"></div>

    <!-- Music toggle button -->
    <button id="btn-music" class="nav-btn" aria-label="Toggle music">
      <svg id="icon-music-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </svg>
      <svg id="icon-music-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
    </button>

  </div>

  <!-- Gallery overlay -->
  <div id="gallery-overlay" class="gallery-overlay hidden">
    <div class="gallery-header">
      <h2>All Photos</h2>
      <button id="btn-close-gallery" class="nav-btn" aria-label="Close thumbnails">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div id="gallery-grid" class="gallery-grid"></div>
  </div>

  <!-- No photos fallback -->
  <div id="no-photos" class="no-photos hidden">
    <div class="no-photos-inner">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      <p>Add your photos to the <code>photos/</code> folder,<br />then open <code>index.html</code> in a browser.</p>
    </div>
  </div>

  <!-- Audio element -->
  <audio id="bg-music" loop>
    <source src="audio/birds-of-a-feather.mp3" type="audio/mpeg">
  </audio>

  <script src="js/carousel.js"></script>
</body>

</html>
